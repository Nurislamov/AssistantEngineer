name: Engineering Core V1 Validation

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  validation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore .\AssistantEngineer.sln
      - run: .\scripts\engineering-core\verify-engineering-core-v1-validation.ps1
      - name: Validation generated artifacts are stale
        run: git diff --exit-code -- docs/validation/** docs/reports/validation/** tests/fixtures/validation/**
      - run: .\scripts\engineering-core\regenerate-engineering-core-v1-validation-artifacts.ps1
