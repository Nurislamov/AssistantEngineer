name: assistantengineer

services:
  assistantengineer-api:
    build:
      context: ..
      dockerfile: deploy/docker/backend/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      AssistantEngineer__EquipmentDiagnostics__Telegram__IsEnabled: ${TELEGRAM_IS_ENABLED:-false}
      AssistantEngineer__EquipmentDiagnostics__Telegram__EnableChatIdDiscovery: ${TELEGRAM_ENABLE_CHAT_ID_DISCOVERY:-false}
    expose:
      - "8080"
    ports:
      - "127.0.0.1:${API_LOCAL_PORT:-8080}:8080"
    restart: unless-stopped

  assistantengineer-frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/}
        VITE_API_VERSION: ${VITE_API_VERSION:-1}
    expose:
      - "80"
    ports:
      - "127.0.0.1:${FRONTEND_LOCAL_PORT:-8081}:80"
    restart: unless-stopped

  reverse-proxy:
    image: caddy:2.8-alpine
    depends_on:
      - assistantengineer-api
      - assistantengineer-frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./reverse-proxy/Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
