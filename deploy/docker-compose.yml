name: assistantengineer

services:
  assistantengineer-api:
    build:
      context: ..
      dockerfile: deploy/docker/backend/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      AssistantEngineer__EquipmentDiagnostics__Telegram__IsEnabled: ${TELEGRAM_IS_ENABLED:-false}
      AssistantEngineer__EquipmentDiagnostics__Telegram__InboundMode: ${TELEGRAM_INBOUND_MODE:-Webhook}
      AssistantEngineer__EquipmentDiagnostics__Telegram__DeleteWebhookOnStartup: ${TELEGRAM_DELETE_WEBHOOK_ON_STARTUP:-false}
      AssistantEngineer__EquipmentDiagnostics__Telegram__Polling__Enabled: ${TELEGRAM_POLLING_ENABLED:-false}
      AssistantEngineer__EquipmentDiagnostics__Telegram__Polling__TimeoutSeconds: ${TELEGRAM_POLLING_TIMEOUT_SECONDS:-50}
      AssistantEngineer__EquipmentDiagnostics__Telegram__Polling__Limit: ${TELEGRAM_POLLING_LIMIT:-25}
      AssistantEngineer__EquipmentDiagnostics__Telegram__Polling__DelayAfterErrorSeconds: ${TELEGRAM_POLLING_DELAY_AFTER_ERROR_SECONDS:-10}
      AssistantEngineer__EquipmentDiagnostics__Telegram__Polling__ProcessedMessageStoreFilePath: ${TELEGRAM_PROCESSED_MESSAGE_STORE_FILE_PATH:-artifacts/operations/equipment-diagnostics-telegram-processed-messages.txt}
      AssistantEngineer__EquipmentDiagnostics__Telegram__Polling__ProcessedMessageStoreMaxEntries: ${TELEGRAM_PROCESSED_MESSAGE_STORE_MAX_ENTRIES:-5000}
      AssistantEngineer__EquipmentDiagnostics__Telegram__EnableChatIdDiscovery: ${TELEGRAM_ENABLE_CHAT_ID_DISCOVERY:-false}
    expose:
      - "8080"
    ports:
      - "127.0.0.1:${API_LOCAL_PORT:-8080}:8080"
    volumes:
      - api_operations:/app/artifacts/operations
    restart: unless-stopped

  assistantengineer-frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/}
        VITE_API_VERSION: ${VITE_API_VERSION:-1}
    expose:
      - "80"
    ports:
      - "127.0.0.1:${FRONTEND_LOCAL_PORT:-8081}:80"
    restart: unless-stopped

  reverse-proxy:
    image: caddy:2.8-alpine
    depends_on:
      - assistantengineer-api
      - assistantengineer-frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./reverse-proxy/Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  api_operations:
  caddy_data:
  caddy_config:
